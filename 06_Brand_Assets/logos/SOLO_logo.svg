<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140" width="380" height="140">
  <defs>
    <radialGradient id="solo-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#F5E6A0;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#B8860B;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1A2030;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="solo-text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6A0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1"/>
    </linearGradient>
    <filter id="solo-blur">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="380" height="140" fill="#1A2030" rx="12"/>

  <!-- Glow halo behind figure -->
  <circle cx="70" cy="55" r="42" fill="url(#solo-glow)" opacity="0.7"/>

  <!-- === ICON: Single human silhouette with radiant light === -->
  <!-- Radiant rays (subtle) -->
  <line x1="70" y1="16" x2="70" y2="6"   stroke="#F5E6A0" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="95" y1="24" x2="102" y2="16" stroke="#F5E6A0" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="45" y1="24" x2="38"  y2="16" stroke="#F5E6A0" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="108" y1="50" x2="118" y2="48" stroke="#B8860B" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
  <line x1="32"  y1="50" x2="22"  y2="48" stroke="#B8860B" stroke-width="1" opacity="0.35" stroke-linecap="round"/>

  <!-- Head (circle) -->
  <circle cx="70" cy="32" r="12" fill="#F5E6A0" filter="url(#solo-blur)"/>

  <!-- Body (simple pillar shape) -->
  <path d="M54,50 Q54,46 70,44 Q86,46 86,50 L88,90 Q80,94 70,95 Q60,94 52,90 Z"
    fill="#B8860B"/>

  <!-- Arms suggestion -->
  <path d="M54,60 Q42,68 40,80" fill="none" stroke="#B8860B" stroke-width="5" stroke-linecap="round"/>
  <path d="M86,60 Q98,68 100,80" fill="none" stroke="#B8860B" stroke-width="5" stroke-linecap="round"/>

  <!-- Shadow beneath -->
  <ellipse cx="70" cy="110" rx="26" ry="5" fill="#000000" opacity="0.35"/>

  <!-- Ground line -->
  <line x1="28" y1="112" x2="112" y2="112" stroke="#B8860B" stroke-width="0.8" opacity="0.4"/>

  <!-- === WORDMARK === -->
  <text x="134" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="700"
    letter-spacing="6"
    fill="url(#solo-text)">SOLO</text>

  <!-- Subtitle -->
  <text x="136" y="96"
    font-family="Arial, sans-serif"
    font-size="10"
    letter-spacing="4"
    fill="#D0D5E8">SELF · DISCOVERY · JOURNEY</text>

  <!-- Tagline -->
  <text x="136" y="116"
    font-family="Arial, sans-serif"
    font-size="9"
    letter-spacing="3"
    fill="#B8860B"
    opacity="0.8">YOUR WHOLE SELF AWAITS</text>
</svg>
