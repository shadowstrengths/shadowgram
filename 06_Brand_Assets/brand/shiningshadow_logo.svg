<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- 다크 배경 그라디언트 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2030;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1420;stop-opacity:1"/>
    </linearGradient>

    <!-- 심볼 골드 그라디언트 (빛 영역) -->
    <radialGradient id="goldGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#E8C96A;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#B8860B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7A5800;stop-opacity:1"/>
    </radialGradient>

    <!-- 심볼 그림자 그라디언트 -->
    <radialGradient id="shadowGrad" cx="60%" cy="65%" r="65%">
      <stop offset="0%" style="stop-color:#2E3D5A;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#1A2030;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A1018;stop-opacity:1"/>
    </radialGradient>

    <!-- 외곽 링 그라디언트 -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#E8C96A;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7A5800;stop-opacity:1"/>
    </linearGradient>

    <!-- 광선 효과 -->
    <radialGradient id="glowGrad" cx="38%" cy="32%" r="45%">
      <stop offset="0%" style="stop-color:#FFE08A;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#FFE08A;stop-opacity:0"/>
    </radialGradient>

    <!-- 클립 패스: 원형 -->
    <clipPath id="circleClip">
      <circle cx="80" cy="80" r="60"/>
    </clipPath>

    <!-- 필터: 미세 글로우 -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="480" height="160" fill="url(#bgGrad)" rx="12"/>

  <!-- ══════════════════════════════ -->
  <!-- 심볼 영역 (원형 80px 반지름) -->
  <!-- ══════════════════════════════ -->

  <!-- 그림자 반구 (하단 우측) -->
  <circle cx="80" cy="80" r="60" fill="url(#shadowGrad)" clip-path="url(#circleClip)"/>

  <!-- 빛 반구 — 비대칭 커브로 분할 -->
  <path d="
    M 80 20
    C 95 20, 125 38, 128 62
    C 131 80, 118 98, 108 112
    C 96 128, 80 140, 80 140
    C 60 140, 30 122, 24 98
    C 18 76, 28 52, 44 38
    C 58 26, 70 20, 80 20 Z
  " fill="url(#goldGrad)" clip-path="url(#circleClip)"/>

  <!-- 광선 글로우 (빛 영역 강조) -->
  <ellipse cx="66" cy="58" rx="28" ry="22"
    fill="url(#glowGrad)" clip-path="url(#circleClip)" opacity="0.8"/>

  <!-- 빛/그림자 경계선 — 미세 골드 라인 -->
  <path d="
    M 80 20
    C 95 20, 125 38, 128 62
    C 131 80, 118 98, 108 112
    C 96 128, 80 140, 80 140
  " fill="none" stroke="#B8860B" stroke-width="0.8" opacity="0.6"/>

  <!-- 외곽 링 -->
  <circle cx="80" cy="80" r="60" fill="none"
    stroke="url(#ringGrad)" stroke-width="2"/>

  <!-- 내부 소형 원 (빛의 핵심) -->
  <circle cx="65" cy="56" r="7" fill="#FFE08A" opacity="0.9" filter="url(#goldGlow)"/>
  <circle cx="65" cy="56" r="4" fill="#FFFFFF" opacity="0.7"/>

  <!-- 내부 소형 원 (그림자의 핵심 — 어두운 점) -->
  <circle cx="96" cy="106" r="6" fill="#0D1420" opacity="0.9"/>
  <circle cx="96" cy="106" r="3" fill="#1A2030" opacity="0.8"/>
  <!-- 그림자 핵심에 미세 골드 테두리 -->
  <circle cx="96" cy="106" r="6" fill="none" stroke="#B8860B" stroke-width="0.6" opacity="0.5"/>

  <!-- ══════════════════════════════ -->
  <!-- 워드마크 영역 -->
  <!-- ══════════════════════════════ -->

  <!-- SHINING -->
  <text x="158" y="82"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
    letter-spacing="6"
    fill="url(#goldGrad)">SHINING</text>

  <!-- SHADOW -->
  <text x="158" y="116"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="300"
    letter-spacing="4"
    fill="#8899AA">SHADOW</text>

  <!-- 브랜드 구분선 -->
  <line x1="158" y1="122" x2="440" y2="122"
    stroke="#B8860B" stroke-width="0.6" opacity="0.4"/>

  <!-- 서브 태그라인 -->
  <text x="160" y="138"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="3.5"
    fill="#8899AA"
    opacity="0.75">Psychology of Light &amp; Shadow</text>

</svg>
