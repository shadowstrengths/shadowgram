<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <radialGradient id="goldGrad2" cx="40%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#9A6E00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6B4A00;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="shadowGrad2" cx="60%" cy="65%" r="65%">
      <stop offset="0%" style="stop-color:#3A4D6E;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#1A2030;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A1018;stop-opacity:1"/>
    </radialGradient>
    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9A6E00;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#D4A017;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#6B4A00;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowGrad2" cx="38%" cy="32%" r="45%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="circleClip2">
      <circle cx="80" cy="80" r="60"/>
    </clipPath>
    <filter id="goldGlow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="textDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A2030;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2E3D5A;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- 화이트 배경 -->
  <rect width="480" height="160" fill="#FFFFFF" rx="12"/>
  <!-- 미세 테두리 -->
  <rect width="480" height="160" fill="none" stroke="#E8E0D0" stroke-width="1" rx="12"/>

  <!-- 그림자 반구 -->
  <circle cx="80" cy="80" r="60" fill="url(#shadowGrad2)" clip-path="url(#circleClip2)"/>

  <!-- 빛 반구 -->
  <path d="
    M 80 20
    C 95 20, 125 38, 128 62
    C 131 80, 118 98, 108 112
    C 96 128, 80 140, 80 140
    C 60 140, 30 122, 24 98
    C 18 76, 28 52, 44 38
    C 58 26, 70 20, 80 20 Z
  " fill="url(#goldGrad2)" clip-path="url(#circleClip2)"/>

  <ellipse cx="66" cy="58" rx="28" ry="22"
    fill="url(#glowGrad2)" clip-path="url(#circleClip2)" opacity="0.7"/>

  <path d="
    M 80 20
    C 95 20, 125 38, 128 62
    C 131 80, 118 98, 108 112
    C 96 128, 80 140, 80 140
  " fill="none" stroke="#9A6E00" stroke-width="0.8" opacity="0.5"/>

  <circle cx="80" cy="80" r="60" fill="none"
    stroke="url(#ringGrad2)" stroke-width="2"/>

  <circle cx="65" cy="56" r="7" fill="#FFD700" opacity="0.85" filter="url(#goldGlow2)"/>
  <circle cx="65" cy="56" r="4" fill="#FFFFFF" opacity="0.9"/>

  <circle cx="96" cy="106" r="6" fill="#0D1420" opacity="0.9"/>
  <circle cx="96" cy="106" r="3" fill="#1A2030" opacity="0.8"/>
  <circle cx="96" cy="106" r="6" fill="none" stroke="#9A6E00" stroke-width="0.6" opacity="0.5"/>

  <!-- SHINING — 다크 컬러 -->
  <text x="158" y="82"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
    letter-spacing="6"
    fill="url(#textDark)">SHINING</text>

  <!-- SHADOW — 미디엄 그레이 -->
  <text x="158" y="116"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="300"
    letter-spacing="4"
    fill="#6B7A8D">SHADOW</text>

  <line x1="158" y1="122" x2="440" y2="122"
    stroke="#9A6E00" stroke-width="0.6" opacity="0.35"/>

  <text x="160" y="138"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="3.5"
    fill="#6B7A8D"
    opacity="0.8">Psychology of Light &amp; Shadow</text>
</svg>
