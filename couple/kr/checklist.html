];

const GROUPS = ['SPARK','VISION','STEADY','PLAYER','HARMONY','SOUL','LOGIC','LEADER'];
let checked = {};
let currentFilter = 'all';

function loadChecked() {
  try { checked = JSON.parse(localStorage.getItem('sg_checklist') || '{}'); } catch(e) { checked = {}; }
}
function saveChecked() {
  try { localStorage.setItem('sg_checklist', JSON.stringify(checked)); } catch(e) {}
}
function updateProgress() {
  const total = DATA.length;
  const done = Object.values(checked).filter(Boolean).length;
  document.getElementById('progress-fill').style.width = (done/total*100) + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total} 확인 완료`;
}
function toggle(key) {
  checked[key] = !checked[key];
  saveChecked();
  const row = document.getElementById('row_' + key);
  if (row) row.className = 'row' + (checked[key] ? ' checked-row' : '');
  updateProgress();
}
function filterGroup(g) {
  currentFilter = g;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  GROUPS.forEach(grp => {
    const el = document.getElementById('group_' + grp);
    if (el) el.style.display = (g === 'all' || g === grp) ? '' : 'none';
  });
}
function resetAll() {
  if (!confirm('체크를 모두 초기화할까요?')) return;
  checked = {};
  saveChecked();
  DATA.forEach(d => {
    const row = document.getElementById('row_' + d.key);
    if (row) row.className = 'row';
  });
  updateProgress();
}
function buildList() {
  const container = document.getElementById('list-container');
  GROUPS.forEach(grp => {
    const items = DATA.filter(d => d.key.startsWith(grp + '_'));
    const div = document.createElement('div');
    div.className = 'group';
    div.id = 'group_' + grp;
    div.innerHTML = `<div class="group-title">${grp} (${items.length}종)</div>`;
    items.forEach((d, i) => {
      const url = BASE + '?a=' + d.key.split('_')[0] + '&b=' + d.key.split('_')[1];
      const isChecked = checked[d.key];
      const row = document.createElement('div');
      row.className = 'row' + (isChecked ? ' checked-row' : '');
      row.id = 'row_' + d.key;
      row.innerHTML = `
        <input type="checkbox" class="check" ${isChecked ? 'checked' : ''} onchange="toggle('${d.key}')">
        <span class="num">${DATA.indexOf(d)+1}</span>
        <span class="key">${d.key}</span>
        <span class="combo">${d.combo}</span>
        <span class="drama">🎬 ${d.drama}</span>
        <span class="actors">${d.actors}</span>
        <a class="link" href="${url}" target="_blank">열기 →</a>
      `;
      div.appendChild(row);
    });
    container.appendChild(div);
  });
}

loadChecked();
buildList();
updateProgress();
</script>
