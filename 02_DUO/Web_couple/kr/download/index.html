<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>리포트 다운로드 — 42world</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0A0A14;--card:#13131F;--gold:#C9A84C;--gold-glow:rgba(201,168,76,0.15);
      --white:#F0EEF8;--silver:#8899AA;--border:#1E1E30;
    }
    body{background:var(--bg);color:var(--white);font-family:-apple-system,Arial,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;
      padding:40px 28px;max-width:420px;width:100%;text-align:center;}
    .logo{font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:24px;}
    .icon{font-size:56px;margin-bottom:16px;}
    h1{font-size:22px;font-weight:900;margin-bottom:8px;line-height:1.4;}
    .combo-badge{display:inline-block;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.4);
      color:var(--gold);font-size:14px;font-weight:900;padding:6px 18px;border-radius:20px;margin:12px 0 20px;}
    .desc{font-size:13px;color:var(--silver);line-height:1.8;margin-bottom:28px;}
    .btn-download{display:block;width:100%;background:linear-gradient(135deg,#C9A84C,#E8D090);
      color:#0A0A14;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:900;
      cursor:pointer;margin-bottom:12px;text-decoration:none;}
    .btn-download:hover{opacity:0.9;}
    .notice{font-size:11px;color:var(--silver);line-height:1.7;margin-top:20px;
      border-top:1px solid var(--border);padding-top:16px;}
    .error-box{background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.3);
      border-radius:14px;padding:20px;margin-bottom:20px;display:none;}
    .error-box p{font-size:13px;color:#FF8080;line-height:1.7;}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);
      border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{display:block;}
    .ready{display:none;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">✦ 42WORLD × SHADOWGRAM ✦</div>

  <!-- 로딩 상태 -->
  <div id="state-loading" class="loading">
    <div class="spinner"></div>
    <p style="color:var(--silver);font-size:14px;">결제 확인 중...</p>
  </div>

  <!-- 준비 완료 상태 -->
  <div id="state-ready" class="ready">
    <div class="icon">📄</div>
    <h1>결제 완료!</h1>
    <div class="combo-badge" id="combo-display">— × —</div>
    <p class="desc">
      커플 리포트가 준비됐어요.<br>
      아래 버튼을 눌러 지금 바로 다운로드하세요.<br>
      <strong style="color:var(--white);">24페이지 심층 분석 리포트</strong>
    </p>
    <a id="btn-download" class="btn-download" href="#">
      📥 리포트 다운로드
    </a>
    <p class="notice">
      ⚠️ 이 링크는 본인만 사용 가능합니다.<br>
      다운로드 후 재접속 시 동일 파일이 제공됩니다.<br><br>
      문의: 42world.kr
    </p>
  </div>

  <!-- 오류 상태 -->
  <div id="state-error" class="ready">
    <div class="icon">😢</div>
    <h1>유형 정보를 찾을 수 없어요</h1>
    <div class="error-box" id="error-box" style="display:block;">
      <p>결제 후 같은 브라우저에서 접속하셨나요?<br>
      아래 버튼으로 검사 페이지로 돌아가서<br>
      다시 시도해주세요.</p>
    </div>
    <a href="/couple/kr/result/" class="btn-download" style="background:var(--card);color:var(--gold);border:1px solid var(--gold);">
      ← 검사 페이지로 돌아가기
    </a>
    <p class="notice">문의: 42world.kr</p>
  </div>
</div>

<script>
// 쿠키 읽기
function getCookie(name){
  const v=document.cookie.split(';').find(c=>c.trim().startsWith(name+'='));
  return v?decodeURIComponent(v.trim().split('=')[1]):null;
}

// 유형명 한글 매핑
const TYPE_KR={
  SPARK:'탐험가',VISION:'예언자',STEADY:'수호자',PLAYER:'플레이어',
  HARMONY:'조화자',SOUL:'영혼가',LOGIC:'논리가',LEADER:'리더'
};

function init(){
  const loading=document.getElementById('state-loading');
  const ready=document.getElementById('state-ready');
  const error=document.getElementById('state-error');

  // URL 파라미터 또는 쿠키에서 combo 읽기
  const params=new URLSearchParams(window.location.search);
  let combo=params.get('combo')||getCookie('sg_combo');

  setTimeout(()=>{
    loading.style.display='none';

    if(!combo){
      error.style.display='block';
      return;
    }

    combo=combo.toUpperCase();
    const parts=combo.split('_');
    if(parts.length<2){
      error.style.display='block';
      return;
    }

    const a=parts[0], b=parts[1];
    const aKr=TYPE_KR[a]||a, bKr=TYPE_KR[b]||b;

    // 배지 표시
    document.getElementById('combo-display').textContent=`${a} × ${b}`;

    // 다운로드 링크 설정
    const pdfUrl=`/couple/kr/reports/combo/${combo}_KR.pdf`;
    const btn=document.getElementById('btn-download');
    btn.href=pdfUrl;
    btn.download=`Shadowgram_Couple_${combo}_KR.pdf`;
    btn.textContent=`📥 ${aKr} × ${bKr} 리포트 다운로드`;

    ready.style.display='block';

    // 쿠키 갱신 (30일)
    document.cookie=`sg_combo=${combo};path=/;max-age=2592000;SameSite=Lax`;
  }, 1000);
}

init();
</script>
</body>
</html>
